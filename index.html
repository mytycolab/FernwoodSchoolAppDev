    if (section) return e(DocViewer, { section: section, config: config, onBack: function() { setActive(null); } });
    return e(Landing, {
      config: config,
      onSelect: function(id) { setActive(id); },
      onAdmin: function() { setShowAdmin(true); },
    });
  }
